<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff4d88,#ff99cc);
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:white;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(8px);
box-shadow:0 0 20px rgba(255,255,255,.3);
}

h1{
font-size:40px;
animation:glow 2s infinite;
}

p{
font-size:20px;
line-height:1.6;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d88;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes glow{
0%{text-shadow:0 0 10px white;}
50%{text-shadow:0 0 25px yellow;}
100%{text-shadow:0 0 10px white;}
}
</style>

</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday 🎂</h1>

<h2>💖 ကျော့သဇင်ခိုင် 💖</h2>

ကျန်းမာပျော်ရွှင်ပြီး<br>

Happy Birthday ❤️
</p>
